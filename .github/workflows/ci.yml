name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Swift 6 toolchain (latest Xcode)
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_16*.app | sort -V | tail -1)"

      - name: Swift version
        run: swift --version

      - name: Build (release)
        run: swift build -c release --product TransmissionRemoteGUI

      - name: Unit tests
        run: swift run KitTests
